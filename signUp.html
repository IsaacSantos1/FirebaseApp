
<!DOCTYPE html>
<html>
    <head>
        <title> Sign Up </title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Login page for the website">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <nav>
            <div class="navTitle"> 
                <img src="Assets/Logo.png" alt="CheckMate Logo" class="logo">
                <h2>CheckMate</h2>
            </div>
            <ul>
                <li><a href="login.html">Log In</a></li>
                <li><a href="signUp.html">Sign Up</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>

        <div class="signUp-container">
            <h2 class="username-button">Username</h2>
            <input type="text" id="username" name="username" placeholder="Enter Username (6 Characters Long)">

            <h2 class="email-button">Email</h2>
            <input type="email" id="email" name="email" placeholder="Enter Email (must have @)">

            <h2 class="password-button">Password</h2>
            <input type="password" id="password" name="password" placeholder="Enter Password (8 Characters Long)">

            <h4>Already Have An Account? <a href="login.html">Log In</a></h4>

            <button>Sign Up</button>
            <script type="module" src="signup.js"></script>
        </div>
    </body>
</html>
