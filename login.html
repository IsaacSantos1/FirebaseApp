<!DOCTYPE html>
<html>
    <head>
        <title> Login </title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Login page for the website">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <nav>
            <div class="navTitle"> 
            <img src="Assets/Logo.png" alt="CheckMate Logo" class="logo">
            <h2>CheckMate</h2>
            </div>
            <ul>
                <li><a href="login.html">Login</a></li>
                <li><a href="signUp.html">Sign Up </a></li>
                <li><a href="settings.html">settings</a></li>
            </ul>
        </nav>
        <div class="login-container">
            <button class="username-button">Username</button>
            <input type="text" id="username" name="username" placeholder="Enter Username">
            <button class="email-button">Email</button>
            <input type="email" id="email" name="email" placeholder="Enter Email">
            <button class="password-button">Password</button>
            <input type="password" id="password" name="password" placeholder="Enter Password">
            <h4 class="Account">Don't have a Account Already? <a href="signUp.html">Sign Up</a></h4>

            <button class="login-button">Login</button>
        </div>
