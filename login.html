<!DOCTYPE html>
<html>
    <head>
        <title> Login </title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Login page for the website">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="main.css">
    </head>
    <body>
        <nav>
            <div class="navTitle"> 
                <img src="Assets/Logo.png" alt="CheckMate Logo" class="logo">
                <h2>CheckMate</h2>
            </div>
            <ul>
                <li><a href="login.html">Log In</a></li>
                <li><a href="signUp.html">Sign Up</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>

        <div class="login-container">
            <h4 class="email-button">Email</h4>
            <input type="email" id="email" name="email" placeholder="Enter Email (must have @)">

            <h4 class="password-button">Password</h4>
            <input type="password" id="password" name="password" placeholder="Enter Password (8 Characters Long)">

            <h4>Don't have an Account Already? <a href="signUp.html">Signup</a></h4>

            <button>Login</button>
            <script type="module" src="login.js"></script>
        </div>
    </body>
</html>
